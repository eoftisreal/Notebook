version: '3.8'

services:
  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-notebook
    ports:
      - "5000:5000"
    environment:
      FLASK_DEBUG: "0"
      PORT: "5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - notebook-network

networks:
  notebook-network:
    driver: bridge