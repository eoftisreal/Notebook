<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Abhishek!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <button id="start-btn">Click to Celebrate! 🎉</button>
    </div>

    <canvas id="fireworks-canvas"></canvas>

    <div id="balloon-container"></div>

    <div class="content-wrapper">
        <h1 class="birthday-title">Happy Birthday<br><span>Abhishek!</span></h1>

        <div class="photo-frame">
            <img src="images/abhishek.jpg" alt="Abhishek">
        </div>
    </div>

    <div class="cake-container">
        <div class="cake">
            <div class="candles">
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
            </div>
            <div class="cake-top"></div>
            <div class="cake-middle"></div>
            <div class="cake-bottom">
                <div class="cake-name">Abhishek</div>
            </div>
        </div>
        <div class="plate"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
